openapi: 3.0.3
info:
  title: Refs API
  version: 1.0.0
components:
  schemas:
    Pet:
      type: object
      required: [name]
      properties:
        name:
          type: string
paths:
  /pets:
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        "201":
          description: Created
