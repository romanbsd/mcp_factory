name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: install
        run: |
          python -m venv generator/.venv
          generator/.venv/bin/pip install -e "generator[dev]"
      - name: pytest
        run: generator/.venv/bin/pytest generator/tests --cov=mcp_gen --cov-fail-under=85

  e2e:
    runs-on: ubuntu-latest
    needs: [rust, python]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: cross-layer e2e
        run: bash tests/e2e/run.sh
